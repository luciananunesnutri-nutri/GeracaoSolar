apsystems:
  base_url: https://api.apsystemsema.com:9282
  max_retries: 3
  timeout: 30
claude:
  api_key: ''
  max_tokens: 1024
  model: claude-haiku-4-5-20251001
database:
  path: data/solar_monitoring.db
logging:
  backup_count: 5
  file: logs/app.log
  level: INFO
  max_bytes: 10485760
scheduler:
  cleanup_enabled: false
  cleanup_interval: 0 2 * * 0
  collection_enabled: true
  collection_interval: 0 18 * * *
  collection_on_startup: false
  evening_summary_enabled: true
  evening_summary_interval: 15 20 * * *
  statistics_enabled: false
  statistics_interval: 5 21 * * *
system:
  tariff_brl: 1.0
web:
  debug: false
  host: 0.0.0.0
  port: 5000
