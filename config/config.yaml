apsystems:
  base_url: https://api.apsystemsema.com:9282
  max_retries: 3
  timeout: 30
database:
  path: data/solar_monitoring.db
logging:
  backup_count: 5
  file: logs/app.log
  level: INFO
  max_bytes: 10485760
scheduler:
  cleanup_enabled: true
  cleanup_interval: 0 2 * * 0
  collection_enabled: true
  collection_interval: 0 18 * * *
  collection_on_startup: false
  evening_summary_interval: 0 20 * * *
  statistics_interval: 55 23 * * *
web:
  debug: false
  host: 0.0.0.0
  port: 5000
