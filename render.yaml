databases:
  - name: geracaosolar-db
    plan: free
    databaseName: geracaosolar
    user: geracaosolar

services:
  - type: web
    name: geracaosolar
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: geracaosolar-db
          property: connectionString
