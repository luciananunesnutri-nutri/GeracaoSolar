server {
    listen 80;
    server_name _;   # aceita qualquer hostname/IP

    # Logs
    access_log /var/log/nginx/solar_access.log;
    error_log  /var/log/nginx/solar_error.log;

    # Compressão
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;

    # Proxy para o Gunicorn
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts (coleta pode demorar)
        proxy_connect_timeout 60s;
        proxy_read_timeout    120s;
        proxy_send_timeout    60s;
    }

    # Cache de assets estáticos
    location ~* \.(css|js|png|jpg|ico|woff2?)$ {
        proxy_pass http://127.0.0.1:5000;
        expires 1d;
        add_header Cache-Control "public";
    }

    # Bloquear acesso a arquivos sensíveis
    location ~ /\.(git|env|yaml) {
        deny all;
        return 404;
    }
}
